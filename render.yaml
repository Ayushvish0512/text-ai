services:
  - type: web
    name: tiny-llm
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt

      mkdir -p models

      # Download model directly from HuggingFace
      curl -L -o models/distilgpt2-q4_k_m.gguf \
      https://huggingface.co/Crataco/distilgpt2-82M-GGUF/resolve/main/distilgpt2-q4_k_m.gguf

      cd llama.cpp
      make clean
      make LLAMA_NATIVE=OFF LLAMA_OPENBLAS=OFF -j2

    startCommand: bash start.sh